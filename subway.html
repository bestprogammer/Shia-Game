<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Metro Rush — Betschardt Games</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#03080f;--s1:#07111e;--s2:#0b1a2e;
  --blue:#1a6fff;--blue2:#4d9fff;--blue3:#a0c8ff;
  --border:#1a3355;--text:#c8deff;--dim:#4a6a8a;
  --gold:#f5c518;--red:#e03030;--green:#22bb55;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:'Rajdhani',sans-serif;
  background:var(--bg);color:var(--text);
  height:100vh;overflow:hidden;
  display:flex;flex-direction:column;
  user-select:none;
}
header{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 1.2rem;height:48px;flex-shrink:0;
  background:rgba(3,8,15,.96);border-bottom:1px solid var(--border);
}
.logo{font-family:'Orbitron',monospace;font-size:.9rem;font-weight:900;color:#fff;cursor:pointer;}
.logo em{font-style:normal;color:var(--blue2);}
.btn{font-family:'Orbitron',monospace;font-size:.56rem;font-weight:700;padding:.35rem .85rem;border:none;border-radius:5px;cursor:pointer;transition:all .18s;text-transform:uppercase;}
.btn-blue{background:transparent;color:var(--blue2);border:2px solid var(--blue);}
.btn-blue:hover{background:var(--blue);color:#fff;}
.btn-green{background:var(--green);color:#fff;border:2px solid var(--green);}
.btn-solid{background:var(--blue);color:#fff;border:2px solid var(--blue);}

/* HUD strip */
.hud-strip{
  display:flex;align-items:center;justify-content:space-around;
  padding:.3rem .8rem;flex-shrink:0;
  background:rgba(3,8,15,.9);border-bottom:1px solid var(--border);
}
.hstat{text-align:center;}
.hstat-l{font-size:.48rem;text-transform:uppercase;letter-spacing:.1em;color:var(--dim);}
.hstat-v{font-family:'Orbitron',monospace;font-size:.95rem;color:var(--blue2);line-height:1.1;}

/* Canvas area */
#gameCanvas{display:block;flex:1;width:100%;}

/* Overlays */
.ov{
  position:fixed;inset:0;
  display:flex;align-items:center;justify-content:center;
  background:rgba(0,0,0,.78);z-index:50;
}
.ov.off{display:none;}
.ovbox{
  background:var(--s1);border:2px solid var(--blue);
  border-radius:16px;padding:2rem 2.4rem;
  text-align:center;max-width:380px;width:92%;
}
.ovbox h1{font-family:'Orbitron',monospace;font-size:1.1rem;color:var(--blue2);margin-bottom:.2rem;}
.ovbox h2{font-family:'Orbitron',monospace;font-size:.7rem;color:var(--gold);margin-bottom:.9rem;}
.ovbox p{font-size:.82rem;color:var(--dim);margin-bottom:1.1rem;line-height:1.5;}
.ovbox .big{font-family:'Orbitron',monospace;font-size:2.2rem;color:var(--gold);margin:.4rem 0 .8rem;}
.brow{display:flex;gap:.6rem;justify-content:center;flex-wrap:wrap;margin-top:.4rem;}
.key{background:rgba(26,111,255,.1);border:1px solid var(--border);border-radius:3px;padding:.08rem .38rem;font-size:.62rem;color:var(--blue2);}
.keys-row{display:flex;gap:.4rem;justify-content:center;flex-wrap:wrap;margin-top:.7rem;font-size:.7rem;color:var(--dim);}

/* mobile btns */
.mobile-controls{
  position:fixed;bottom:1rem;
  display:flex;gap:1rem;
  z-index:20;pointer-events:none;
  width:100%;justify-content:space-between;padding:0 1rem;
}
.mob-btn{
  min-width:65px;height:55px;border-radius:10px;
  background:rgba(26,111,255,.18);border:2px solid rgba(26,111,255,.45);
  display:flex;align-items:center;justify-content:center;
  font-size:1rem;font-family:'Orbitron',monospace;font-weight:700;
  pointer-events:all;cursor:pointer;
  color:var(--blue2);transition:background .1s;padding:0 .5rem;
}
.mob-btn:active{background:rgba(26,111,255,.45);}
</style>
</head>
<body>
<header>
  <div class="logo" onclick="goHome()">Betschardt <em>Games</em></div>
  <div style="font-family:'Orbitron',monospace;font-size:.78rem;color:var(--blue2);">🚇 METRO RUSH</div>
  <button class="btn btn-blue" onclick="goHome()">← Home</button>
</header>

<div class="hud-strip">
  <div class="hstat"><div class="hstat-l">Score</div><div class="hstat-v" id="hScore">0</div></div>
  <div class="hstat"><div class="hstat-l">Münzen</div><div class="hstat-v" id="hCoins">🪙 0</div></div>
  <div class="hstat"><div class="hstat-l">Leben</div><div class="hstat-v" id="hLives">❤️❤️❤️</div></div>
  <div class="hstat"><div class="hstat-l">Highscore</div><div class="hstat-v" id="hHigh">0</div></div>
</div>

<canvas id="gameCanvas"></canvas>

<!-- MENU -->
<div class="ov" id="menuOv">
  <div class="ovbox">
    <div style="font-size:3rem;margin-bottom:.3rem;">🚇</div>
    <h1>METRO RUSH</h1>
    <h2>Subway Surfer Style Runner</h2>
    <p>Weiche Zügen und Hindernissen aus!<br>Sammle Münzen und laufe so weit wie möglich.</p>
    <div class="brow">
      <button class="btn btn-green" style="padding:.6rem 1.6rem;font-size:.68rem;" onclick="startGame()">▶ SPIELEN</button>
      <button class="btn btn-blue" onclick="goHome()">🏠 Home</button>
    </div>
    <div class="keys-row">
      <span class="key">← →</span> Lane &nbsp;
      <span class="key">↑ / Space</span> Springen &nbsp;
      <span class="key">↓</span> Rutschen
    </div>
  </div>
</div>

<!-- GAME OVER -->
<div class="ov off" id="goOv">
  <div class="ovbox">
    <h1 style="color:var(--red);">💀 GAME OVER</h1>
    <div class="big" id="goScore">0</div>
    <p id="goMsg">Score gespeichert!</p>
    <div class="brow">
      <button class="btn btn-green" style="padding:.55rem 1.3rem;font-size:.64rem;" onclick="restartGame()">▶ Nochmal</button>
      <button class="btn btn-blue" onclick="goHome()">🏠 Home</button>
    </div>
  </div>
</div>

<!-- Mobile controls -->
<div class="mobile-controls" id="mobControls" style="display:none;">
  <div style="display:flex;gap:.5rem;">
    <div class="mob-btn" ontouchstart="mobileAction('left')">⬅</div>
    <div class="mob-btn" ontouchstart="mobileAction('right')">➡</div>
  </div>
  <div style="display:flex;gap:.5rem;">
    <div class="mob-btn" ontouchstart="mobileAction('down')">⬇</div>
    <div class="mob-btn" ontouchstart="mobileAction('up')">⬆</div>
  </div>
</div>

<script>
// ─────────────────────────────────────────────
//  SETUP
// ─────────────────────────────────────────────
const cv = document.getElementById('gameCanvas');
const cx = cv.getContext('2d');
const user = JSON.parse(localStorage.getItem('bg_currentUser') || 'null');
const cheat = JSON.parse(localStorage.getItem('bg_activeCheat') || 'null');

let W, H;
function resize() {
  W = cv.width = cv.offsetWidth;
  H = cv.height = cv.offsetHeight;
}
window.addEventListener('resize', () => { resize(); });
resize();

const isMobile = /Mobi|Android|iPhone/i.test(navigator.userAgent);
// Always show mobile buttons — useful on desktop too

function goHome() {
  cancelAnimationFrame(raf);
  localStorage.setItem('bg_lastResult', JSON.stringify({ game: 'subway', score: G.score, title: '🚇 METRO RUSH', cheat: !!cheat }));
  if (user) localStorage.setItem('bg_sessionUser', JSON.stringify(user));
  window.location.href = 'index.html';
}

// ─────────────────────────────────────────────
//  CONSTANTS
// ─────────────────────────────────────────────
const LANE_COUNT  = 3;
const GRAVITY     = 0.55;
const JUMP_POWER  = -13;
const SLIDE_DURATION = 38;
const BASE_SPEED  = 4;  // easier start speed

let G = {}; // game state
let raf = null;
let lastT = 0;

// ─────────────────────────────────────────────
//  LANE GEOMETRY (computed from canvas size)
// ─────────────────────────────────────────────
function laneX(lane) {
  const totalW = Math.min(W * 0.55, 480);
  const laneW  = totalW / LANE_COUNT;
  return W / 2 + (lane - 1) * laneW;
}
function laneW() {
  return Math.min(W * 0.55, 480) / LANE_COUNT;
}
function groundY() { return H * 0.74; }

// ─────────────────────────────────────────────
//  GAME INIT
// ─────────────────────────────────────────────
function initGame() {
  const god = cheat && cheat.code === 'GODMODE';
  G = {
    running: false,
    over: false,
    score: 0,
    coins: 0,
    dist: 0,
    speed: BASE_SPEED,
    // player
    lane: 1,
    visualLane: 1,   // smooth transition
    targetLane: 1,
    py: groundY(),
    vy: 0,
    onGround: true,
    sliding: false,
    slideTimer: 0,
    invTimer: 0,
    lives: god ? 9 : 3,
    // objects
    obstacles: [],
    coins: [],
    trains: [],
    powerups: [],
    particles: [],
    // timers
    obstT: 60,
    coinT: 40,
    trainT: 220,
    pwrT: 400,
    // bg scroll
    bgScroll: 0,
    skyScroll: 0,
    runFrame: 0,
    runTimer: 0,
  };
}

// ─────────────────────────────────────────────
//  CONTROLS
// ─────────────────────────────────────────────
const keys = {};
document.addEventListener('keydown', e => {
  if (keys[e.code]) return;
  keys[e.code] = true;
  if (!G.running) return;
  if (e.code === 'ArrowLeft' || e.code === 'KeyA')  switchLane(-1);
  if (e.code === 'ArrowRight'|| e.code === 'KeyD')  switchLane(1);
  if ((e.code === 'ArrowUp' || e.code === 'KeyW' || e.code === 'Space') && G.onGround) doJump();
  if ((e.code === 'ArrowDown'|| e.code === 'KeyS') && !G.sliding) doSlide();
  if (e.code === 'Escape') goHome();
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space'].includes(e.code)) e.preventDefault();
});
document.addEventListener('keyup', e => keys[e.code] = false);

// Touch swipe
let tx0=0,ty0=0;
cv.addEventListener('touchstart', e => { tx0=e.touches[0].clientX; ty0=e.touches[0].clientY; e.preventDefault(); }, {passive:false});
cv.addEventListener('touchend', e => {
  if (!G.running) return;
  const dx = e.changedTouches[0].clientX - tx0;
  const dy = e.changedTouches[0].clientY - ty0;
  if (Math.abs(dx) > Math.abs(dy)) { dx < -30 ? switchLane(-1) : switchLane(1); }
  else { dy < -30 && G.onGround ? doJump() : dy > 30 ? doSlide() : null; }
  e.preventDefault();
}, {passive:false});

function mobileAction(a) {
  if (!G.running) return;
  if (a==='left')  switchLane(-1);
  if (a==='right') switchLane(1);
  if (a==='up' && G.onGround) doJump();
  if (a==='down')  doSlide();
}

function switchLane(d) {
  const nl = G.targetLane + d;
  if (nl < 0 || nl > 2) return;
  G.targetLane = nl;
}
function doJump() {
  G.vy = JUMP_POWER * (cheat && cheat.code === 'SUPERBLOCK' ? 1.4 : 1);
  G.onGround = false;
  G.sliding = false;
  spawnParticle(laneX(G.visualLane), groundY(), '#4d9fff', 8);
}
function doSlide() {
  if (!G.onGround) { G.vy = Math.max(G.vy, 4); return; }
  G.sliding = true;
  G.slideTimer = SLIDE_DURATION;
}

// ─────────────────────────────────────────────
//  START / RESTART
// ─────────────────────────────────────────────
const HS = parseInt(localStorage.getItem('bg_hs_subway') || '0');
document.getElementById('hHigh').textContent = HS;

function startGame() {
  document.getElementById('menuOv').classList.add('off');
  document.getElementById('goOv').classList.add('off');
  initGame();
  G.running = true;
  lastT = performance.now();
  raf = requestAnimationFrame(loop);
}
function restartGame() {
  document.getElementById('goOv').classList.add('off');
  startGame();
}

// ─────────────────────────────────────────────
//  MAIN LOOP
// ─────────────────────────────────────────────
function loop(ts) {
  raf = requestAnimationFrame(loop);
  const dt = Math.min((ts - lastT) / 16.67, 3);
  lastT = ts;
  if (G.running && !G.over) update(dt);
  draw();
}

// ─────────────────────────────────────────────
//  UPDATE
// ─────────────────────────────────────────────
function update(dt) {
  // Speed ramp
  G.dist += G.speed * dt * 0.4;
  G.speed = Math.min(BASE_SPEED + G.dist / 600, 12);  // slower ramp, lower max
  G.score = Math.floor(G.dist * 3);

  // Lane lerp
  G.visualLane += (G.targetLane - G.visualLane) * 0.18 * dt * 3;
  if (Math.abs(G.visualLane - G.targetLane) < 0.01) { G.visualLane = G.targetLane; G.lane = G.targetLane; }

  // Gravity
  G.vy += GRAVITY * dt;
  G.py += G.vy * dt;
  const gy = groundY();
  if (G.py >= gy) { G.py = gy; G.vy = 0; G.onGround = true; }

  // Slide
  if (G.sliding) { G.slideTimer -= dt; if (G.slideTimer <= 0) G.sliding = false; }

  // Invincible
  if (G.invTimer > 0) G.invTimer -= dt;

  // Scroll
  G.bgScroll = (G.bgScroll + G.speed * 0.5 * dt) % 80;
  G.skyScroll = (G.skyScroll + 0.3 * dt) % W;

  // Run anim
  G.runTimer += dt;
  if (G.runTimer > 7) { G.runFrame = (G.runFrame + 1) % 4; G.runTimer = 0; }

  // Spawn timers
  G.obstT -= dt; if (G.obstT <= 0) { spawnObstacle(); G.obstT = Math.max(45, 90 - G.speed * 1.5 + Math.random() * 30);  // more space between obstacles }
  G.coinT -= dt; if (G.coinT <= 0) { spawnCoins(); G.coinT = 30 + Math.random() * 30; }
  G.trainT -= dt; if (G.trainT <= 0) { spawnTrain(); G.trainT = 200 + Math.random() * 150; }
  G.pwrT  -= dt; if (G.pwrT  <= 0) { spawnPowerup(); G.pwrT  = 350 + Math.random() * 250; }

  // Move objects
  const spd = G.speed * dt;
  G.obstacles = G.obstacles.filter(o => { o.y += spd * 2.4; return o.y < H + 120; });
  G.coins     = G.coins.filter(c  => { c.y  += spd * 2.4; c.bob += 0.06; return c.y < H + 40; });
  G.trains    = G.trains.filter(t  => { t.y  += spd * 2.8; return t.y < H + 350; });
  G.powerups  = G.powerups.filter(p => { p.y  += spd * 2.4; return p.y < H + 40; });
  G.particles = G.particles.filter(p => {
    p.x += p.vx * dt; p.y += p.vy * dt; p.vy += 0.12 * dt; p.life -= dt; return p.life > 0;
  });

  // Collisions
  if (G.invTimer <= 0 && !(cheat && cheat.code === 'GODMODE')) {
    checkObstacles();
    checkTrains();
  }
  collectCoins();
  collectPowerups();

  updateHUD();
}

// ─────────────────────────────────────────────
//  SPAWNERS
// ─────────────────────────────────────────────
function spawnObstacle() {
  const types = [
    { w: 44, h: 58, type: 'barrier', canSlide: false, color: '#cc2233', label: '⚠️' },
    { w: 54, h: 28, type: 'low',     canSlide: true,  color: '#cc6600', label: '↓' },
    { w: 36, h: 80, type: 'pillar',  canSlide: false, color: '#1a55bb', label: '' },
  ];
  const t = types[Math.floor(Math.random() * types.length)];
  const lane = Math.floor(Math.random() * 3);
  G.obstacles.push({ ...t, lane, y: -t.h - 10 });

  // Double lane blocker only at high speed
  if (G.speed > 8 && Math.random() < 0.15) {
    const other = (lane + 1 + Math.floor(Math.random() * 2)) % 3;
    if (other !== lane) {
      G.obstacles.push({ ...t, lane: other, y: -t.h - 10 });
    }
  }
}

function spawnCoins() {
  const lane = Math.floor(Math.random() * 3);
  const count = 3 + Math.floor(Math.random() * 5);
  for (let i = 0; i < count; i++) {
    const l = Math.random() < 0.7 ? lane : Math.floor(Math.random() * 3);
    G.coins.push({ lane: l, y: -40 - i * 26, bob: Math.random() * Math.PI * 2, collected: false });
  }
}

function spawnTrain() {
  // 1 or 2 lanes
  const lane = Math.floor(Math.random() * 3);
  G.trains.push({ lane, y: -300, h: 300, speed: G.speed });
  if (Math.random() < 0.3) {
    const other = (lane + 1 + Math.floor(Math.random())) % 3;
    if (other !== lane) G.trains.push({ lane: other, y: -300, h: 300 });
  }
}

function spawnPowerup() {
  const types = ['shield', 'magnet', 'x2'];
  G.powerups.push({
    type: types[Math.floor(Math.random() * types.length)],
    lane: Math.floor(Math.random() * 3),
    y: -30, bob: 0,
  });
}

// ─────────────────────────────────────────────
//  COLLISIONS
// ─────────────────────────────────────────────
function playerRect() {
  const ph = G.sliding ? 30 : 58;
  const pw = G.sliding ? 56 : 34;
  const px = laneX(G.visualLane);
  return { x: px - pw / 2, y: G.py - ph, w: pw, h: ph };
}

function rectsOverlap(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
}

function checkObstacles() {
  const pr = playerRect();
  for (const o of G.obstacles) {
    if (G.sliding && o.canSlide) continue;
    const ox = laneX(o.lane);
    const or = { x: ox - o.w / 2, y: o.y - o.h, w: o.w, h: o.h };
    if (rectsOverlap(pr, or)) { takeDamage(); return; }
  }
}

function checkTrains() {
  const pr = playerRect();
  for (const t of G.trains) {
    const tx = laneX(t.lane);
    const tw = laneW() * 0.88;
    const tr = { x: tx - tw / 2, y: t.y - t.h, w: tw, h: t.h };
    if (rectsOverlap(pr, tr)) { takeDamage(); return; }
  }
}

function collectCoins() {
  const px = laneX(G.visualLane);
  for (const c of G.coins) {
    if (c.collected) continue;
    const cx = laneX(c.lane);
    if (Math.abs(px - cx) < 36 && Math.abs(G.py - c.y) < 38) {
      c.collected = true;
      const mult = cheat && cheat.name.includes('x2') ? 2 : 1;
      G.score += 50 * mult;
      G.coins++;
      spawnParticle(cx, c.y, '#f5c518', 5);
    }
  }
}

function collectPowerups() {
  const px = laneX(G.visualLane);
  G.powerups = G.powerups.filter(p => {
    const ox = laneX(p.lane);
    if (Math.abs(px - ox) < 36 && Math.abs(G.py - p.y) < 40) {
      activatePowerup(p.type);
      return false;
    }
    return true;
  });
}

function activatePowerup(type) {
  if (type === 'shield') { G.invTimer = 180; spawnParticle(laneX(G.visualLane), G.py, '#4d9fff', 12); }
  if (type === 'x2')     { spawnParticle(laneX(G.visualLane), G.py, '#f5c518', 10); }
  if (type === 'magnet') { spawnParticle(laneX(G.visualLane), G.py, '#aa44ff', 10); }
}

function takeDamage() {
  G.lives--;
  G.invTimer = 80;
  spawnParticle(laneX(G.visualLane), G.py, '#e03030', 14);
  if (G.lives <= 0) endGame();
}

function spawnParticle(x, y, color, n) {
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2, s = 1.5 + Math.random() * 3;
    G.particles.push({ x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s - 2, life: 18 + Math.random() * 12, maxLife: 30, color, r: 2 + Math.random() * 3 });
  }
}

// ─────────────────────────────────────────────
//  HUD
// ─────────────────────────────────────────────
function updateHUD() {
  document.getElementById('hScore').textContent = G.score;
  document.getElementById('hCoins').textContent = '🪙 ' + (G.coins || 0);
  document.getElementById('hLives').textContent = G.lives > 0 ? '❤️'.repeat(Math.min(G.lives, 5)) : '💀';
  const hs = Math.max(G.score, parseInt(localStorage.getItem('bg_hs_subway') || '0'));
  document.getElementById('hHigh').textContent = hs;
}

// ─────────────────────────────────────────────
//  END GAME
// ─────────────────────────────────────────────
function endGame() {
  G.running = false; G.over = true;
  const prev = parseInt(localStorage.getItem('bg_hs_subway') || '0');
  if (G.score > prev) localStorage.setItem('bg_hs_subway', G.score);
  localStorage.setItem('bg_lastResult', JSON.stringify({ game: 'subway', score: G.score, title: '🚇 METRO RUSH', cheat: !!cheat }));
  if (user) localStorage.setItem('bg_sessionUser', JSON.stringify(user));
  document.getElementById('goScore').textContent = G.score + ' pts';
  document.getElementById('goMsg').textContent = user ? 'Score gespeichert! 🎉' : 'Anmelden um zu speichern.';
  document.getElementById('goOv').classList.remove('off');
}

// ─────────────────────────────────────────────
//  DRAW
// ─────────────────────────────────────────────
function draw() {
  cx.clearRect(0, 0, W, H);
  drawSky();
  drawCity();
  drawGround();
  drawLaneLines();
  drawTrains();
  drawObstacles();
  drawCoins();
  drawPowerups();
  drawPlayer();
  drawParticles();
  if (!G.running && !G.over) drawIdleScreen();
}

function drawSky() {
  const gr = cx.createLinearGradient(0, 0, 0, groundY());
  gr.addColorStop(0, '#020818');
  gr.addColorStop(0.5, '#040d20');
  gr.addColorStop(1, '#060f25');
  cx.fillStyle = gr; cx.fillRect(0, 0, W, groundY());
  // Stars
  for (let i = 0; i < 60; i++) {
    const sx = (i * 137 + G.skyScroll * 0.1) % W;
    const sy = (i * 79) % (groundY() * 0.55);
    const br = 0.12 + Math.sin(Date.now() / 900 + i) * 0.1;
    cx.fillStyle = `rgba(180,210,255,${br})`; cx.fillRect(sx, sy, 1.5, 1.5);
  }
}

function drawCity() {
  const gy = groundY();
  const buildings = [
    { x: 0, w: 60, h: 90, c: '#08152a' },  { x: 65, w: 40, h: 130, c: '#0a1e38' },
    { x: 110, w: 80, h: 75, c: '#061020' }, { x: 195, w: 55, h: 110, c: '#0c2040' },
    { x: 255, w: 45, h: 145, c: '#081828' },{ x: 305, w: 70, h: 90, c: '#071422' },
    { x: 380, w: 50, h: 120, c: '#0a1c34' },{ x: 435, w: 65, h: 80, c: '#061018' },
    { x: 505, w: 55, h: 135, c: '#0b2040' },{ x: 565, w: 75, h: 95, c: '#081525' },
    { x: 645, w: 60, h: 115, c: '#091828' },{ x: 710, w: 80, h: 100, c: '#07121e' },
  ];
  const scroll = G.bgScroll * 0.25;
  buildings.forEach(b => {
    let bx = (b.x - scroll % 790 + W) % (W + 150) - 80;
    cx.fillStyle = b.c;
    cx.fillRect(bx, gy - b.h, b.w, b.h);
    // Windows
    cx.fillStyle = 'rgba(26,111,255,.1)';
    for (let wy = gy - b.h + 8; wy < gy - 8; wy += 14) {
      for (let wx = bx + 5; wx < bx + b.w - 5; wx += 12) {
        if ((wx + wy) % 3 !== 0) cx.fillRect(wx, wy, 6, 8);
      }
    }
  });
}

function drawGround() {
  const gy = groundY();
  // Ground fill
  const gr = cx.createLinearGradient(0, gy, 0, H);
  gr.addColorStop(0, '#0a1828'); gr.addColorStop(1, '#040c18');
  cx.fillStyle = gr; cx.fillRect(0, gy, W, H - gy);

  // Scrolling rail sleepers
  const sleeperSpacing = 32;
  const off = G.bgScroll % sleeperSpacing;
  for (let y = gy + off; y < H; y += sleeperSpacing) {
    cx.fillStyle = 'rgba(26,111,255,.07)';
    cx.fillRect(0, y, W, 3);
  }
  // Rails
  for (let i = 0; i <= LANE_COUNT; i++) {
    const rx = W / 2 - laneW() * 1.5 + i * laneW();
    cx.fillStyle = 'rgba(77,159,255,.18)';
    cx.fillRect(rx - 2, gy, 4, H - gy);
  }
}

function drawLaneLines() {
  const gy = groundY();
  cx.setLineDash([18, 12]);
  cx.strokeStyle = 'rgba(26,111,255,.1)'; cx.lineWidth = 1.5;
  for (let l = 0; l < 2; l++) {
    const lx = W / 2 - laneW() * 0.5 + l * laneW();
    const off = G.bgScroll % 30;
    cx.beginPath();
    for (let y = gy - off; y < gy; y += 30) {
      cx.moveTo(lx, y); cx.lineTo(lx, y + 18);
    }
    cx.stroke();
  }
  cx.setLineDash([]);
}

function drawTrains() {
  G.trains.forEach(t => {
    const tx = laneX(t.lane), tw = laneW() * 0.88;
    const ty = t.y, th = t.h;
    // Train body
    cx.shadowColor = '#1a6fff'; cx.shadowBlur = 10;
    const tgr = cx.createLinearGradient(tx - tw/2, 0, tx + tw/2, 0);
    tgr.addColorStop(0, '#081828'); tgr.addColorStop(0.5, '#1a3560'); tgr.addColorStop(1, '#081828');
    cx.fillStyle = tgr;
    cx.beginPath(); cx.roundRect(tx - tw/2, ty - th, tw, th, 6); cx.fill();
    // Blue accent stripe
    cx.fillStyle = 'rgba(26,111,255,.5)';
    cx.fillRect(tx - tw/2, ty - th, tw, 8);
    cx.fillRect(tx - tw/2, ty - 10, tw, 10);
    // Windows
    for (let wy = ty - th + 18; wy < ty - 18; wy += 24) {
      cx.fillStyle = 'rgba(77,159,255,.3)';
      cx.fillRect(tx - tw/2 + 6, wy, tw - 12, 14);
    }
    // Warning flash
    const flash = Math.floor(Date.now() / 180) % 2;
    cx.fillStyle = flash ? 'rgba(224,48,48,.9)' : 'rgba(224,48,48,.15)';
    cx.beginPath(); cx.arc(tx, ty - th - 10, 7, 0, Math.PI * 2); cx.fill();
    cx.shadowBlur = 0;
  });
}

function drawObstacles() {
  G.obstacles.forEach(o => {
    const ox = laneX(o.lane);
    cx.save();
    cx.shadowColor = o.color; cx.shadowBlur = 8;
    if (o.type === 'barrier') {
      cx.fillStyle = o.color;
      cx.fillRect(ox - o.w/2, o.y - o.h, o.w, o.h);
      // diagonal stripes
      cx.fillStyle = 'rgba(255,255,255,.15)';
      for (let s = 0; s < o.h; s += 12) cx.fillRect(ox - o.w/2, o.y - o.h + s, o.w, 5);
      cx.font = '14px serif'; cx.textAlign = 'center';
      cx.fillText('⚠️', ox, o.y - o.h - 4);
    } else if (o.type === 'low') {
      cx.fillStyle = o.color;
      cx.fillRect(ox - o.w/2, o.y - o.h, o.w, o.h);
      cx.fillStyle = 'rgba(255,200,0,.3)';
      cx.fillRect(ox - o.w/2, o.y - o.h, o.w, 5);
      cx.font = '11px Orbitron,monospace'; cx.fillStyle='rgba(255,200,100,.8)'; cx.textAlign='center';
      cx.fillText('↓SLIDE', ox, o.y - o.h - 4);
    } else {
      const pg = cx.createLinearGradient(ox - o.w/2, 0, ox + o.w/2, 0);
      pg.addColorStop(0, '#0d2855'); pg.addColorStop(1, '#1a4488');
      cx.fillStyle = pg;
      cx.fillRect(ox - o.w/2, o.y - o.h, o.w, o.h);
      cx.fillStyle = 'rgba(77,159,255,.3)';
      cx.fillRect(ox - o.w/2, o.y - o.h, 5, o.h);
    }
    cx.shadowBlur = 0; cx.restore();
  });
}

function drawCoins() {
  G.coins.forEach(c => {
    if (c.collected) return;
    const cx2 = laneX(c.lane);
    const cy = c.y + Math.sin(c.bob) * 4;
    cx.save();
    cx.shadowColor = '#f5c518'; cx.shadowBlur = 10;
    const cgr = cx.createRadialGradient(cx2, cy, 1, cx2, cy, 8);
    cgr.addColorStop(0, '#fff8c0'); cgr.addColorStop(0.5, '#f5c518'); cgr.addColorStop(1, '#b87800');
    cx.fillStyle = cgr;
    cx.beginPath(); cx.arc(cx2, cy, 7, 0, Math.PI * 2); cx.fill();
    cx.shadowBlur = 0; cx.restore();
  });
}

function drawPowerups() {
  G.powerups.forEach(p => {
    p.bob = (p.bob || 0) + 0.05;
    const px2 = laneX(p.lane);
    const py2 = p.y + Math.sin(p.bob) * 5;
    const icons = { shield: '🛡️', magnet: '🧲', x2: '✖️2' };
    const colors = { shield: '#4d9fff', magnet: '#aa44ff', x2: '#f5c518' };
    cx.save();
    cx.shadowColor = colors[p.type]; cx.shadowBlur = 14;
    cx.fillStyle = colors[p.type] + '33';
    cx.beginPath(); cx.arc(px2, py2, 16, 0, Math.PI * 2); cx.fill();
    cx.strokeStyle = colors[p.type]; cx.lineWidth = 1.5;
    cx.beginPath(); cx.arc(px2, py2, 16, 0, Math.PI * 2); cx.stroke();
    cx.font = '14px serif'; cx.textAlign = 'center';
    cx.fillStyle = '#fff'; cx.shadowBlur = 0;
    cx.fillText(icons[p.type], px2, py2 + 5);
    cx.shadowBlur = 0; cx.restore();
  });
}

function drawPlayer() {
  // Blink when invincible
  if (G.invTimer > 0 && Math.floor(G.invTimer / 5) % 2 === 0) return;

  const px2 = laneX(G.visualLane);
  const py2 = G.py;
  const ph = G.sliding ? 30 : 58;
  const pw = G.sliding ? 54 : 34;

  cx.save();
  cx.shadowColor = '#4d9fff'; cx.shadowBlur = 10;

  if (G.sliding) {
    // Flat slide body
    cx.fillStyle = '#1a5acc';
    cx.beginPath(); cx.roundRect(px2 - pw/2, py2 - ph, pw, ph, 6); cx.fill();
    // Head at right side
    cx.fillStyle = '#ffcc88';
    cx.beginPath(); cx.arc(px2 + pw/2 - 10, py2 - ph * 0.6, 11, 0, Math.PI * 2); cx.fill();
    // Cap
    cx.fillStyle = '#cc2200';
    cx.fillRect(px2 + pw/2 - 20, py2 - ph * 0.6 - 13, 22, 8);
  } else {
    const legSwing = Math.sin(G.runFrame * Math.PI / 2) * 7;
    // Shadow under feet
    cx.fillStyle = 'rgba(0,0,0,.18)';
    cx.beginPath(); cx.ellipse(px2, py2 + 2, 14, 4, 0, 0, Math.PI * 2); cx.fill();
    // Legs
    cx.shadowBlur = 0;
    cx.fillStyle = '#0a1e40';
    cx.fillRect(px2 - 10, py2 - 18 + legSwing, 9, 18);
    cx.fillRect(px2 + 1,  py2 - 18 - legSwing, 9, 18);
    // Shoes
    cx.fillStyle = '#884400';
    cx.fillRect(px2 - 12, py2 - 4 + legSwing, 13, 7);
    cx.fillRect(px2 - 1,  py2 - 4 - legSwing, 13, 7);
    // Body
    cx.shadowColor = '#4d9fff'; cx.shadowBlur = 8;
    cx.fillStyle = '#1a6fff';
    cx.fillRect(px2 - 12, py2 - ph + 12, 24, ph - 28);
    // Scarf
    cx.fillStyle = '#ff6600';
    cx.fillRect(px2 - 10, py2 - ph + 22, 20, 5);
    // Head
    cx.shadowBlur = 0;
    cx.fillStyle = '#ffcc88';
    cx.beginPath(); cx.arc(px2, py2 - ph + 9, 13, 0, Math.PI * 2); cx.fill();
    // Cap
    cx.fillStyle = '#cc2200';
    cx.fillRect(px2 - 13, py2 - ph - 4, 26, 10);
    cx.fillRect(px2 - 15, py2 - ph + 5, 30, 4);
    // Eye
    cx.fillStyle = '#222';
    cx.fillRect(px2 + 4, py2 - ph + 6, 4, 4);
    // Arm swing
    cx.fillStyle = '#1a6fff';
    cx.fillRect(px2 + 12, py2 - ph + 18 + legSwing * 0.5, 7, 20);
    cx.fillRect(px2 - 19, py2 - ph + 18 - legSwing * 0.5, 7, 20);
    // Jump sparkle
    if (!G.onGround) {
      cx.fillStyle = 'rgba(77,159,255,.3)';
      cx.fillRect(px2 - 8, py2, 16, 6);
    }
  }
  cx.shadowBlur = 0; cx.restore();
}

function drawParticles() {
  G.particles.forEach(p => {
    cx.globalAlpha = p.life / p.maxLife;
    cx.fillStyle = p.color;
    cx.beginPath(); cx.arc(p.x, p.y, p.r, 0, Math.PI * 2); cx.fill();
    cx.globalAlpha = 1;
  });
}

function drawIdleScreen() {
  cx.fillStyle = 'rgba(3,8,15,.4)'; cx.fillRect(0, 0, W, H);
  cx.font = 'bold 18px Orbitron,monospace'; cx.fillStyle = 'rgba(77,159,255,.6)';
  cx.textAlign = 'center'; cx.fillText('Drücke SPIELEN um zu starten', W/2, H/2);
}
