<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake — Betschardt Games</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#03080f;--s1:#07111e;--s2:#0b1a2e;--blue:#1a6fff;--blue2:#4d9fff;--border:#1a3355;--text:#c8deff;--dim:#4a6a8a;--gold:#f5c518;--red:#e03030;--green:#22bb55;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Rajdhani',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;}
header{width:100%;display:flex;align-items:center;justify-content:space-between;padding:0 1.5rem;height:52px;background:rgba(3,8,15,.96);border-bottom:1px solid var(--border);}
.logo{font-family:'Orbitron',monospace;font-size:.95rem;font-weight:900;color:#fff;cursor:pointer;}
.logo em{font-style:normal;color:var(--blue2);}
.btn{font-family:'Orbitron',monospace;font-size:.58rem;font-weight:700;letter-spacing:.04em;padding:.38rem .9rem;border:none;border-radius:5px;cursor:pointer;transition:all .18s;text-transform:uppercase;}
.btn-blue{background:transparent;color:var(--blue2);border:2px solid var(--blue);}
.btn-blue:hover{background:var(--blue);color:#fff;}
.btn-solid{background:var(--blue);color:#fff;border:2px solid var(--blue);}
.btn-solid:hover{background:var(--blue2);}
.btn-green{background:var(--green);color:#fff;border:2px solid var(--green);}
.hud{width:660px;max-width:98vw;display:flex;align-items:center;justify-content:space-between;padding:.6rem 1rem;background:var(--s1);border:1px solid var(--border);border-radius:8px 8px 0 0;margin-top:1.2rem;}
.hud-item{text-align:center;}
.hud-lbl{font-size:.55rem;text-transform:uppercase;letter-spacing:.1em;color:var(--dim);}
.hud-val{font-family:'Orbitron',monospace;font-size:1.1rem;color:var(--blue2);font-weight:700;}
canvas{display:block;border-left:1px solid var(--border);border-right:1px solid var(--border);max-width:98vw;}
.btns{width:660px;max-width:98vw;display:flex;gap:.6rem;justify-content:center;padding:.7rem;background:var(--s1);border:1px solid var(--border);border-radius:0 0 8px 8px;margin-bottom:1rem;}
.cheat-bar{width:660px;max-width:98vw;background:rgba(26,111,255,.08);border:1px solid rgba(26,111,255,.3);border-radius:6px;padding:.4rem 1rem;font-size:.75rem;color:var(--blue2);text-align:center;margin-bottom:.4rem;display:none;}
.keys{font-size:.7rem;color:var(--dim);text-align:center;padding:.4rem;}
.key{background:rgba(26,111,255,.1);border:1px solid var(--border);border-radius:4px;padding:.12rem .4rem;font-size:.62rem;color:var(--blue2);}
</style>
</head>
<body>
<header>
  <div class="logo" onclick="goHome()">Betschardt <em>Games</em></div>
  <div style="font-family:'Orbitron',monospace;font-size:.82rem;color:var(--blue2);">🐍 SNAKE</div>
  <button class="btn btn-blue" onclick="goHome()">← Home</button>
</header>

<div class="hud">
  <div class="hud-item"><div class="hud-lbl">Score</div><div class="hud-val" id="hScore">0</div></div>
  <div class="hud-item"><div class="hud-lbl">Highscore</div><div class="hud-val" id="hHigh">0</div></div>
  <div class="hud-item"><div class="hud-lbl">Level</div><div class="hud-val" id="hLevel">1</div></div>
  <div class="hud-item"><div class="hud-lbl">Länge</div><div class="hud-val" id="hLen">3</div></div>
</div>
<div class="cheat-bar" id="cheatBar">⚡ CHEAT: <span id="cheatName"></span></div>
<canvas id="cv" width="660" height="440"></canvas>
<div class="btns">
  <button class="btn btn-green" id="startBtn" onclick="startOrToggle()">▶ START</button>
  <button class="btn btn-blue" onclick="goHome()">🏠 Home</button>
</div>
<div class="keys"><span class="key">← → ↑ ↓</span> oder <span class="key">WASD</span> Steuern · <span class="key">P</span> Pause · <span class="key">ESC</span> Home</div>

<script>
const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
const SZ=20,COLS=33,ROWS=22;
let snake=[],dir={x:1,y:0},food={},score=0,level=1,loop=null,running=false,paused=false;

const user=JSON.parse(localStorage.getItem('bg_currentUser')||'null');
const cheat=JSON.parse(localStorage.getItem('bg_activeCheat')||'null');
const hs=parseInt(localStorage.getItem('bg_hs_snake')||'0');
document.getElementById('hHigh').textContent=hs;

if(cheat){document.getElementById('cheatBar').style.display='block';document.getElementById('cheatName').textContent=cheat.name;}

function goHome(){
  if(loop){clearInterval(loop);loop=null;}
  window.location.href='index.html';
}

function startOrToggle(){
  if(!running){startGame();}
  else{paused=!paused;document.getElementById('startBtn').textContent=paused?'▶ Weiter':'⏸ Pause';}
}

function startGame(){
  if(loop){clearInterval(loop);loop=null;}
  document.removeEventListener('keydown',onKey);
  snake=[{x:16,y:11},{x:15,y:11},{x:14,y:11}];
  dir={x:1,y:0};score=0;level=1;running=true;paused=false;
  placeFood();updateHUD();
  document.getElementById('startBtn').textContent='⏸ Pause';
  const god=cheat&&cheat.code==='GODMODE';
  const spd=cheat&&cheat.code==='SPEEDRUN'?60:130;
  document.addEventListener('keydown',onKey);
  loop=setInterval(tick,spd);
}

function placeFood(){
  do{food={x:Math.floor(Math.random()*COLS),y:Math.floor(Math.random()*ROWS)};}
  while(snake.some(s=>s.x===food.x&&s.y===food.y));
}

function tick(){
  if(paused) return;
  const god=cheat&&cheat.code==='GODMODE';
  const h={x:snake[0].x+dir.x,y:snake[0].y+dir.y};
  if(!god&&(h.x<0||h.x>=COLS||h.y<0||h.y>=ROWS)){endGame();return;}
  if(god){h.x=(h.x+COLS)%COLS;h.y=(h.y+ROWS)%ROWS;}
  if(!god&&snake.some(s=>s.x===h.x&&s.y===h.y)){endGame();return;}
  snake.unshift(h);
  if(h.x===food.x&&h.y===food.y){
    const mult=cheat&&cheat.name.includes('x2')?2:1;
    score+=10*mult;level=Math.floor(score/100)+1;
    placeFood();updateHUD();
  } else snake.pop();
  draw();
}

function draw(){
  ctx.fillStyle='#020c04';ctx.fillRect(0,0,660,440);
  ctx.strokeStyle='rgba(26,111,255,.06)';ctx.lineWidth=.5;
  for(let i=0;i<COLS;i++){ctx.beginPath();ctx.moveTo(i*SZ,0);ctx.lineTo(i*SZ,440);ctx.stroke();}
  for(let j=0;j<ROWS;j++){ctx.beginPath();ctx.moveTo(0,j*SZ);ctx.lineTo(660,j*SZ);ctx.stroke();}
  snake.forEach((s,i)=>{
    const c=i===0?'#4d9fff':i<4?'#1a6fff':'#0d4aaa';
    ctx.shadowColor=c;ctx.shadowBlur=i===0?14:5;
    ctx.fillStyle=c;ctx.fillRect(s.x*SZ+1,s.y*SZ+1,SZ-2,SZ-2);
  });
  ctx.shadowColor='#e03030';ctx.shadowBlur=12;ctx.fillStyle='#e03030';
  ctx.fillRect(food.x*SZ+3,food.y*SZ+3,SZ-6,SZ-6);ctx.shadowBlur=0;
  if(paused){
    ctx.fillStyle='rgba(3,8,15,.65)';ctx.fillRect(0,0,660,440);
    ctx.font='bold 22px Orbitron,monospace';ctx.fillStyle='#4d9fff';ctx.textAlign='center';ctx.fillText('PAUSE',330,225);
  }
}

function updateHUD(){
  document.getElementById('hScore').textContent=score;
  document.getElementById('hLevel').textContent=level;
  document.getElementById('hLen').textContent=snake.length;
  const curHs=parseInt(localStorage.getItem('bg_hs_snake')||'0');
  if(score>curHs){localStorage.setItem('bg_hs_snake',score);document.getElementById('hHigh').textContent=score;}
}

function onKey(e){
  const m={ArrowUp:{x:0,y:-1},ArrowDown:{x:0,y:1},ArrowLeft:{x:-1,y:0},ArrowRight:{x:1,y:0},KeyW:{x:0,y:-1},KeyS:{x:0,y:1},KeyA:{x:-1,y:0},KeyD:{x:1,y:0}};
  if(e.code==='KeyP'){startOrToggle();return;}
  if(e.code==='Escape'){goHome();return;}
  if(m[e.code]&&!(m[e.code].x===-dir.x&&m[e.code].y===-dir.y)){dir=m[e.code];e.preventDefault();}
}

function endGame(){
  clearInterval(loop);loop=null;running=false;
  document.removeEventListener('keydown',onKey);
  document.getElementById('startBtn').textContent='▶ Nochmal';
  // Save result to return to index
  localStorage.setItem('bg_lastResult',JSON.stringify({game:'snake',score,title:'🐍 GAME OVER',cheat:!!cheat}));
  if(user) localStorage.setItem('bg_sessionUser',JSON.stringify(user));
  setTimeout(()=>window.location.href='index.html',400);
}

// Draw idle screen
ctx.fillStyle='#020c04';ctx.fillRect(0,0,660,440);
ctx.font='bold 16px Orbitron,monospace';ctx.fillStyle='rgba(77,159,255,.5)';ctx.textAlign='center';ctx.fillText('Drücke START zum Spielen',330,225);
ctx.font='11px Rajdhani,sans-serif';ctx.fillStyle='rgba(77,159,255,.3)';ctx.fillText('WASD oder Pfeiltasten · P = Pause',330,255);
</script>
</body>
</html>
