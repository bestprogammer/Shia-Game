<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake — Shai Games</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600;700&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0000;--bg2:#110000;--card:#140000;--red:#cc0000;--red2:#ff2222;--border:rgba(204,0,0,.18);--border2:rgba(204,0,0,.38);--text:#f0dada;--dim:#8a5555;--gold:#f5c518;--green:#1aaa44;}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 35% at 50% 0%,rgba(160,0,0,.07),transparent 65%);pointer-events:none;z-index:0;}
::-webkit-scrollbar{width:4px;} ::-webkit-scrollbar-track{background:#0a0000;} ::-webkit-scrollbar-thumb{background:var(--red);}
header,header *{position:relative;z-index:100;}

/* HEADER */
header{display:flex;align-items:center;justify-content:space-between;padding:0 1.3rem;height:52px;
  background:rgba(8,0,0,.97);border-bottom:1px solid var(--border2);position:sticky;top:0;z-index:100;backdrop-filter:blur(12px);}
header::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:1px;
  background:linear-gradient(to right,transparent,var(--red),var(--red2),var(--red),transparent);}
.sg-logo{display:flex;align-items:center;gap:.45rem;font-family:'Bebas Neue',sans-serif;font-size:1.5rem;letter-spacing:.05em;color:#fff;cursor:pointer;}
.sg-logo svg{width:28px;height:33px;filter:drop-shadow(0 0 5px var(--red));flex-shrink:0;}
.sg-logo span{color:var(--red2);}
.sg-title{font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:.08em;color:var(--red2);}
.btn{font-family:'Orbitron',monospace;font-size:.52rem;font-weight:700;padding:.34rem .82rem;border:none;border-radius:4px;cursor:pointer;transition:all .18s;text-transform:uppercase;}
.btn-outline{background:transparent;color:var(--red2);border:1px solid var(--border2);}
.btn-outline:hover{background:rgba(180,0,0,.15);border-color:var(--red);}
.btn-red{background:var(--red);color:#fff;border:1px solid var(--red);}
.btn-red:hover{background:var(--red2);box-shadow:0 0 14px rgba(200,0,0,.4);}
.btn-green{background:var(--green);color:#fff;border:1px solid var(--green);}
.btn-green:hover{background:#22cc55;}

/* HUD */
.hud{display:flex;align-items:center;justify-content:space-around;flex-wrap:wrap;
  padding:.3rem .8rem;background:rgba(8,0,0,.92);border-bottom:1px solid var(--border);}
.hud-item{text-align:center;padding:.1rem .4rem;}
.hud-lbl{font-size:.44rem;text-transform:uppercase;letter-spacing:.1em;color:var(--dim);}
.hud-val{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;color:var(--red2);letter-spacing:.04em;line-height:1.1;}
.hud-val.gold{color:var(--gold);} .hud-val.green{color:var(--green);}

/* OVERLAYS */
.ov{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.88);z-index:200;}
.ov.off{display:none;}
.ob{background:#0e0000;border:1px solid var(--border2);border-radius:12px;padding:1.8rem 2.2rem;text-align:center;max-width:400px;width:92%;box-shadow:0 0 50px rgba(140,0,0,.2);}
.ob::before{content:'';display:block;width:44px;height:2px;background:linear-gradient(to right,transparent,var(--red2),transparent);margin:0 auto .8rem;}
.ob h1{font-family:'Bebas Neue',sans-serif;font-size:2rem;letter-spacing:.08em;color:var(--red2);margin-bottom:.15rem;}
.ob h2{font-family:'Orbitron',monospace;font-size:.58rem;color:var(--dim);margin-bottom:.8rem;}
.ob p{font-size:.8rem;color:var(--dim);line-height:1.55;margin-bottom:.9rem;}
.ob .big{font-family:'Bebas Neue',sans-serif;font-size:2.8rem;color:var(--gold);margin:.25rem 0 .5rem;letter-spacing:.05em;}
.brow{display:flex;gap:.5rem;justify-content:center;flex-wrap:wrap;margin-top:.5rem;}
.keys{display:flex;flex-wrap:wrap;gap:.28rem;justify-content:center;margin-top:.6rem;font-size:.66rem;color:var(--dim);}
.key{background:rgba(180,0,0,.1);border:1px solid var(--border2);border-radius:3px;padding:.05rem .34rem;font-size:.57rem;color:var(--red2);}

/* CANVAS WRAP */
.canvas-wrap{display:flex;flex-direction:column;align-items:center;padding:.7rem 1rem 1.2rem;}
canvas{border:1px solid var(--border2);border-radius:4px 4px 0 0;display:block;max-width:98vw;box-shadow:0 0 25px rgba(120,0,0,.15);}
.bottom-btns{max-width:98vw;display:flex;gap:.6rem;justify-content:center;padding:.6rem;background:rgba(10,0,0,.8);border:1px solid var(--border);border-radius:0 0 4px 4px;}
.cheat-bar{background:rgba(180,0,0,.08);border:1px solid var(--border2);border-radius:5px;padding:.36rem 1rem;font-size:.7rem;color:var(--red2);text-align:center;margin:.35rem 0;display:none;font-family:'Orbitron',monospace;max-width:98vw;}
.keys-hint{font-size:.67rem;color:var(--dim);text-align:center;padding:.3rem;max-width:98vw;}

/* memory grid */
.card{aspect-ratio:1.2;background:#140000;border:1px solid var(--border);border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1.8rem;transition:all .2s;user-select:none;}
.card:hover:not(.flipped):not(.matched){border-color:var(--red2);background:rgba(180,0,0,.08);}
.card.flipped{background:rgba(180,0,0,.1);border-color:var(--red2);}
.card.matched{background:rgba(26,170,68,.1);border-color:var(--green);cursor:default;}
.card-back{font-family:'Orbitron',monospace;font-size:1rem;color:rgba(204,0,0,.3);}
.time-danger{color:var(--red2)!important;}

/* reaction */
.arena{width:100%;height:320px;border-radius:8px;border:2px solid var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:background .2s;user-select:none;background:#140000;}
.arena.waiting{background:#200008;border-color:var(--red);}
.arena.go{background:#001a08;border-color:var(--green);}
.arena-text{font-family:'Bebas Neue',sans-serif;font-size:2.5rem;letter-spacing:.06em;color:var(--red2);}
.arena.go .arena-text{color:var(--green);text-shadow:0 0 25px rgba(26,170,68,.5);}
.arena-sub{font-size:.88rem;color:var(--dim);margin-top:.4rem;}
.result-chip{background:#140000;border:1px solid var(--border);border-radius:6px;padding:.45rem .9rem;text-align:center;}
.result-chip .val{font-family:'Bebas Neue',sans-serif;font-size:1.3rem;letter-spacing:.04em;}
.result-chip .lbl{font-size:.6rem;color:var(--dim);text-transform:uppercase;}
.fast{color:var(--green);}.ok{color:var(--gold);}.slow{color:var(--red2);}
.prog-dot{width:13px;height:13px;border-radius:50%;background:rgba(180,0,0,.15);border:1px solid var(--border2);transition:all .2s;}
.prog-dot.done{background:var(--red);border-color:var(--red2);}
.prog-dot.active{background:var(--red2);border-color:var(--red2);box-shadow:0 0 8px var(--red);}
</style>
</head>
<body>
<header>
  <div class="sg-logo" onclick="goHome()"><svg viewBox="0 0 30 35" fill="none"><path d="M15 2C8.4 2 3 7.4 3 14V32C3 32 5.5 29.5 8 32C10.5 34.5 10.5 32 15 32C19.5 32 19.5 34.5 22 32C24.5 29.5 27 32 27 32V14C27 7.4 21.6 2 15 2Z" fill="#cc0000" fill-opacity=".85" stroke="#ff3333" stroke-width=".8"/><ellipse cx="11" cy="13" rx="2.5" ry="3.2" fill="white"/><ellipse cx="19" cy="13" rx="2.5" ry="3.2" fill="white"/><ellipse cx="11.6" cy="14" rx="1.3" ry="1.8" fill="#0a0000"/><ellipse cx="19.6" cy="14" rx="1.3" ry="1.8" fill="#0a0000"/></svg>Shai<span>Games</span></div>
  <div style="font-family:'Orbitron',monospace;font-size:.82rem;color:var(--blue2);">🐍 SNAKE</div>
  <button class="btn btn-outline" onclick="goHome()">← Home</button>
</header>

<div class="hud">
  <div class="hud-item"><div class="hud-lbl">Score</div><div class="hud-val" id="hScore">0</div></div>
  <div class="hud-item"><div class="hud-lbl">Highscore</div><div class="hud-val" id="hHigh">0</div></div>
  <div class="hud-item"><div class="hud-lbl">Level</div><div class="hud-val" id="hLevel">1</div></div>
  <div class="hud-item"><div class="hud-lbl">Länge</div><div class="hud-val" id="hLen">3</div></div>
</div>
<div class="cheat-bar" id="cheatBar">⚡ CHEAT: <span id="cheatName"></span></div>
<canvas id="cv" width="660" height="440"></canvas>
<div class="bottom-btns">
  <button class="btn btn-green" id="startBtn" onclick="startOrToggle()">▶ START</button>
  <button class="btn btn-outline" onclick="goHome()">🏠 Home</button>
</div>
<div class="keys-hint"><span class="key">← → ↑ ↓</span> oder <span class="key">WASD</span> Steuern · <span class="key">P</span> Pause · <span class="key">ESC</span> Home</div>

<script>
const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
const SZ=20,COLS=33,ROWS=22;
let snake=[],dir={x:1,y:0},food={},score=0,level=1,loop=null,running=false,paused=false;

const user=JSON.parse(localStorage.getItem('bg_currentUser')||'null');
const cheat=JSON.parse(localStorage.getItem('bg_activeCheat')||'null');
const hs=parseInt(localStorage.getItem('bg_hs_snake')||'0');
document.getElementById('hHigh').textContent=hs;

if(cheat){document.getElementById('cheatBar').style.display='block';document.getElementById('cheatName').textContent=cheat.name;}

function goHome(){
  if(loop){clearInterval(loop);loop=null;}
  window.location.href='index.html';
}

function startOrToggle(){
  if(!running){startGame();}
  else{paused=!paused;document.getElementById('startBtn').textContent=paused?'▶ Weiter':'⏸ Pause';}
}

function startGame(){
  if(loop){clearInterval(loop);loop=null;}
  document.removeEventListener('keydown',onKey);
  snake=[{x:16,y:11},{x:15,y:11},{x:14,y:11}];
  dir={x:1,y:0};score=0;level=1;running=true;paused=false;
  placeFood();updateHUD();
  document.getElementById('startBtn').textContent='⏸ Pause';
  const god=cheat&&cheat.code==='GODMODE';
  const spd=cheat&&cheat.code==='SPEEDRUN'?60:130;
  document.addEventListener('keydown',onKey);
  loop=setInterval(tick,spd);
}

function placeFood(){
  do{food={x:Math.floor(Math.random()*COLS),y:Math.floor(Math.random()*ROWS)};}
  while(snake.some(s=>s.x===food.x&&s.y===food.y));
}

function tick(){
  if(paused) return;
  const god=cheat&&cheat.code==='GODMODE';
  const h={x:snake[0].x+dir.x,y:snake[0].y+dir.y};
  if(!god&&(h.x<0||h.x>=COLS||h.y<0||h.y>=ROWS)){endGame();return;}
  if(god){h.x=(h.x+COLS)%COLS;h.y=(h.y+ROWS)%ROWS;}
  if(!god&&snake.some(s=>s.x===h.x&&s.y===h.y)){endGame();return;}
  snake.unshift(h);
  if(h.x===food.x&&h.y===food.y){
    const mult=cheat&&cheat.name.includes('x2')?2:1;
    score+=10*mult;level=Math.floor(score/100)+1;
    placeFood();updateHUD();
  } else snake.pop();
  draw();
}

function draw(){
  ctx.fillStyle='#0a0000';ctx.fillRect(0,0,660,440);
  ctx.strokeStyle='rgba(180,0,0,.06)';ctx.lineWidth=.5;
  for(let i=0;i<COLS;i++){ctx.beginPath();ctx.moveTo(i*SZ,0);ctx.lineTo(i*SZ,440);ctx.stroke();}
  for(let j=0;j<ROWS;j++){ctx.beginPath();ctx.moveTo(0,j*SZ);ctx.lineTo(660,j*SZ);ctx.stroke();}
  snake.forEach((s,i)=>{
    const c=i===0?'#ff3333':i<4?'#cc0000':'#880000';
    ctx.shadowColor=c;ctx.shadowBlur=i===0?12:4;
    ctx.fillStyle=c;ctx.fillRect(s.x*SZ+1,s.y*SZ+1,SZ-2,SZ-2);
  });
  ctx.shadowColor='#f5c518';ctx.shadowBlur=14;ctx.fillStyle='#f5c518';
  ctx.fillRect(food.x*SZ+3,food.y*SZ+3,SZ-6,SZ-6);ctx.shadowBlur=0;
  if(paused){
    ctx.fillStyle='rgba(0,0,0,.7)';ctx.fillRect(0,0,660,440);
    ctx.font='bold 22px Orbitron,monospace';ctx.fillStyle='#ff3333';ctx.textAlign='center';ctx.fillText('PAUSE',330,225);
  }
}

function updateHUD(){
  document.getElementById('hScore').textContent=score;
  document.getElementById('hLevel').textContent=level;
  document.getElementById('hLen').textContent=snake.length;
  const curHs=parseInt(localStorage.getItem('bg_hs_snake')||'0');
  if(score>curHs){localStorage.setItem('bg_hs_snake',score);document.getElementById('hHigh').textContent=score;}
}

function onKey(e){
  const m={ArrowUp:{x:0,y:-1},ArrowDown:{x:0,y:1},ArrowLeft:{x:-1,y:0},ArrowRight:{x:1,y:0},KeyW:{x:0,y:-1},KeyS:{x:0,y:1},KeyA:{x:-1,y:0},KeyD:{x:1,y:0}};
  if(e.code==='KeyP'){startOrToggle();return;}
  if(e.code==='Escape'){goHome();return;}
  if(m[e.code]&&!(m[e.code].x===-dir.x&&m[e.code].y===-dir.y)){dir=m[e.code];e.preventDefault();}
}

function endGame(){
  clearInterval(loop);loop=null;running=false;
  document.removeEventListener('keydown',onKey);
  document.getElementById('startBtn').textContent='▶ Nochmal';
  // Save result to return to index
  localStorage.setItem('bg_lastResult',JSON.stringify({game:'snake',score,title:'🐍 GAME OVER',cheat:!!cheat}));
  if(user){localStorage.setItem('bg_sessionUser',JSON.stringify(user));localStorage.setItem('sg_sessionUser',JSON.stringify(user));}
  setTimeout(()=>window.location.href='index.html',400);
}

// Draw idle screen
ctx.fillStyle='#0a0000';ctx.fillRect(0,0,660,440);
ctx.font='bold 16px Orbitron,monospace';ctx.fillStyle='rgba(200,0,0,.45)';ctx.textAlign='center';ctx.fillText('Drücke START zum Spielen',330,225);
ctx.font='11px Rajdhani,sans-serif';ctx.fillStyle='rgba(180,0,0,.3)';ctx.fillText('WASD oder Pfeiltasten · P = Pause',330,255);
</script>
</body>
</html>
