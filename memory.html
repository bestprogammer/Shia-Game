<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memory — Betschardt Games</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#03080f;--s1:#07111e;--s2:#0b1a2e;--blue:#1a6fff;--blue2:#4d9fff;--border:#1a3355;--text:#c8deff;--dim:#4a6a8a;--gold:#f5c518;--green:#22bb55;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Rajdhani',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;}
header{width:100%;display:flex;align-items:center;justify-content:space-between;padding:0 1.5rem;height:52px;background:rgba(3,8,15,.96);border-bottom:1px solid var(--border);}
.logo{font-family:'Orbitron',monospace;font-size:.95rem;font-weight:900;color:#fff;cursor:pointer;}
.logo em{font-style:normal;color:var(--blue2);}
.btn{font-family:'Orbitron',monospace;font-size:.58rem;font-weight:700;padding:.38rem .9rem;border:none;border-radius:5px;cursor:pointer;transition:all .18s;text-transform:uppercase;}
.btn-blue{background:transparent;color:var(--blue2);border:2px solid var(--blue);}
.btn-blue:hover{background:var(--blue);color:#fff;}
.btn-green{background:var(--green);color:#fff;border:2px solid var(--green);}
.top-bar{width:680px;max-width:98vw;display:flex;align-items:center;justify-content:space-between;padding:.6rem 1rem;background:var(--s1);border:1px solid var(--border);border-radius:8px;margin-top:1.2rem;}
.hud-item{text-align:center;}
.hud-lbl{font-size:.55rem;text-transform:uppercase;letter-spacing:.1em;color:var(--dim);}
.hud-val{font-family:'Orbitron',monospace;font-size:1.1rem;color:var(--blue2);}
.cheat-bar{width:680px;max-width:98vw;background:rgba(26,111,255,.08);border:1px solid rgba(26,111,255,.3);border-radius:6px;padding:.4rem 1rem;font-size:.75rem;color:var(--blue2);text-align:center;margin:.4rem 0;display:none;}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;width:680px;max-width:98vw;padding:1rem;background:var(--s1);border:1px solid var(--border);border-radius:8px;margin:.4rem 0;}
.card{aspect-ratio:1.2;background:var(--s2);border:1px solid var(--border);border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:2rem;transition:all .2s;position:relative;overflow:hidden;user-select:none;}
.card:hover:not(.flipped):not(.matched){border-color:var(--blue);background:rgba(26,111,255,.08);}
.card.flipped{background:rgba(26,111,255,.15);border-color:var(--blue2);}
.card.matched{background:rgba(34,187,85,.1);border-color:var(--green);cursor:default;}
.card.hide-emoji span{opacity:0;}
.card-inner{font-size:1.8rem;}
.card-back{font-family:'Orbitron',monospace;font-size:1.1rem;color:rgba(26,111,255,.3);}
.btns{width:680px;max-width:98vw;display:flex;gap:.6rem;justify-content:center;padding:.6rem;}
.time-danger{color:#e03030!important;}
</style>
</head>
<body>
<header>
  <div class="logo" onclick="goHome()">Betschardt <em>Games</em></div>
  <div style="font-family:'Orbitron',monospace;font-size:.82rem;color:var(--blue2);">🃏 MEMORY</div>
  <button class="btn btn-blue" onclick="goHome()">← Home</button>
</header>

<div class="top-bar">
  <div class="hud-item"><div class="hud-lbl">Score</div><div class="hud-val" id="hScore">0</div></div>
  <div class="hud-item"><div class="hud-lbl">Paare</div><div class="hud-val" id="hPairs">0/8</div></div>
  <div class="hud-item"><div class="hud-lbl">Züge</div><div class="hud-val" id="hMoves">0</div></div>
  <div class="hud-item"><div class="hud-lbl">Zeit</div><div class="hud-val" id="hTime">60</div></div>
</div>
<div class="cheat-bar" id="cheatBar">⚡ CHEAT: <span id="cheatName"></span></div>
<div class="grid" id="grid"></div>
<div class="btns">
  <button class="btn btn-green" id="startBtn" onclick="startGame()">▶ START</button>
  <button class="btn btn-blue" onclick="goHome()">🏠 Home</button>
</div>

<script>
const user=JSON.parse(localStorage.getItem('bg_currentUser')||'null');
const cheat=JSON.parse(localStorage.getItem('bg_activeCheat')||'null');
if(cheat){document.getElementById('cheatBar').style.display='block';document.getElementById('cheatName').textContent=cheat.name;}

function goHome(){if(timerI) clearInterval(timerI);window.location.href='index.html';}

let cards=[],flipped=[],matched=0,moves=0,score=0,timeLeft=60,timerI=null,running=false,busy=false;

const EMOJIS=['🎮','⚡','🎯','🔥','💎','🌟','🚀','👾'];

function startGame(){
  if(timerI) clearInterval(timerI);
  const pairs=[...EMOJIS,...EMOJIS].sort(()=>Math.random()-.5);
  cards=pairs.map((e,i)=>({id:i,emoji:e,flipped:false,matched:false}));
  flipped=[];matched=0;moves=0;score=0;running=true;busy=false;
  const extraTime=cheat&&cheat.code==='MORETIME';
  timeLeft=extraTime?120:60;
  document.getElementById('startBtn').textContent='🔄 Neustart';
  renderGrid();
  timerI=setInterval(()=>{
    if(!running) return;
    timeLeft--;
    const el=document.getElementById('hTime');
    el.textContent=timeLeft;
    if(timeLeft<=10) el.classList.add('time-danger');
    else el.classList.remove('time-danger');
    if(timeLeft<=0){clearInterval(timerI);running=false;endGame('⏱ ZEIT!');}
  },1000);
}

function renderGrid(){
  const g=document.getElementById('grid');g.innerHTML='';
  cards.forEach((c,i)=>{
    const div=document.createElement('div');
    div.className='card'+(c.flipped||c.matched?' flipped':'')+' '+(c.matched?'matched':'');
    if(c.flipped||c.matched) div.innerHTML=`<span class="card-inner">${c.emoji}</span>`;
    else div.innerHTML=`<span class="card-back">?</span>`;
    div.onclick=()=>clickCard(i);
    g.appendChild(div);
  });
  document.getElementById('hMoves').textContent=moves;
  document.getElementById('hPairs').textContent=matched+'/8';
}

function clickCard(i){
  if(!running||busy) return;
  const c=cards[i];if(c.flipped||c.matched) return;
  c.flipped=true;flipped.push(c);renderGrid();
  if(flipped.length===2){
    moves++;busy=true;
    if(flipped[0].emoji===flipped[1].emoji){
      flipped[0].matched=true;flipped[1].matched=true;matched++;flipped=[];busy=false;
      if(matched===8){clearInterval(timerI);running=false;const mult=cheat&&cheat.name.includes('x2')?2:1;score=Math.round((10000/Math.max(1,moves)/Math.max(0.1,(60-timeLeft+1)))*1000)*mult;renderGrid();setTimeout(()=>endGame('🃏 FERTIG!'),300);}
      else renderGrid();
    } else {
      setTimeout(()=>{flipped.forEach(x=>x.flipped=false);flipped=[];busy=false;renderGrid();},850);
    }
  }
}

function endGame(title){
  document.getElementById('hScore').textContent=score;
  localStorage.setItem('bg_lastResult',JSON.stringify({game:'memory',score,title,cheat:!!cheat}));
  if(user) localStorage.setItem('bg_sessionUser',JSON.stringify(user));
  setTimeout(()=>window.location.href='index.html',400);
}
</script>
</body>
</html>
