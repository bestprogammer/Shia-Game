<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flappy Bird — Betschardt Games</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#03080f;--s1:#07111e;--blue:#1a6fff;--blue2:#4d9fff;--border:#1a3355;--text:#c8deff;--dim:#4a6a8a;--green:#22bb55;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Rajdhani',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;}
header{width:100%;display:flex;align-items:center;justify-content:space-between;padding:0 1.5rem;height:52px;background:rgba(3,8,15,.96);border-bottom:1px solid var(--border);}
.logo{font-family:'Orbitron',monospace;font-size:.95rem;font-weight:900;color:#fff;cursor:pointer;}
.logo em{font-style:normal;color:var(--blue2);}
.btn{font-family:'Orbitron',monospace;font-size:.58rem;font-weight:700;padding:.38rem .9rem;border:none;border-radius:5px;cursor:pointer;transition:all .18s;text-transform:uppercase;}
.btn-blue{background:transparent;color:var(--blue2);border:2px solid var(--blue);}
.btn-blue:hover{background:var(--blue);color:#fff;}
.btn-green{background:var(--green);color:#fff;border:2px solid var(--green);}
.hud{width:660px;max-width:98vw;display:flex;align-items:center;justify-content:space-between;padding:.6rem 1rem;background:var(--s1);border:1px solid var(--border);border-radius:8px 8px 0 0;margin-top:1.2rem;}
.hud-item{text-align:center;}
.hud-lbl{font-size:.55rem;text-transform:uppercase;letter-spacing:.1em;color:var(--dim);}
.hud-val{font-family:'Orbitron',monospace;font-size:1.1rem;color:var(--blue2);}
canvas{display:block;max-width:98vw;cursor:pointer;}
.btns{width:660px;max-width:98vw;display:flex;gap:.6rem;justify-content:center;padding:.7rem;background:var(--s1);border:1px solid var(--border);border-radius:0 0 8px 8px;}
.cheat-bar{width:660px;max-width:98vw;background:rgba(26,111,255,.08);border:1px solid rgba(26,111,255,.3);border-radius:6px;padding:.4rem 1rem;font-size:.75rem;color:var(--blue2);text-align:center;margin-bottom:.4rem;display:none;}
.keys{font-size:.7rem;color:var(--dim);text-align:center;padding:.4rem;}
.key{background:rgba(26,111,255,.1);border:1px solid var(--border);border-radius:4px;padding:.12rem .4rem;font-size:.62rem;color:var(--blue2);}
</style>
</head>
<body>
<header>
  <div class="logo" onclick="goHome()">Betschardt <em>Games</em></div>
  <div style="font-family:'Orbitron',monospace;font-size:.82rem;color:var(--blue2);">🐦 FLAPPY BIRD</div>
  <button class="btn btn-blue" onclick="goHome()">← Home</button>
</header>
<div class="hud">
  <div class="hud-item"><div class="hud-lbl">Score</div><div class="hud-val" id="hScore">0</div></div>
  <div class="hud-item"><div class="hud-lbl">Highscore</div><div class="hud-val" id="hHigh">0</div></div>
  <div class="hud-item"><div class="hud-lbl">Level</div><div class="hud-val" id="hLevel">1</div></div>
</div>
<div class="cheat-bar" id="cheatBar">⚡ CHEAT: <span id="cheatName"></span></div>
<canvas id="cv" width="660" height="440"></canvas>
<div class="btns">
  <button class="btn btn-green" id="startBtn" onclick="doStart()">▶ START</button>
  <button class="btn btn-blue" onclick="goHome()">🏠 Home</button>
</div>
<div class="keys"><span class="key">Klicken</span> oder <span class="key">Space</span> Fliegen · <span class="key">ESC</span> Home</div>

<script>
const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
let bird={},pipes=[],score=0,level=1,loop=null,running=false,frame=0;
const user=JSON.parse(localStorage.getItem('bg_currentUser')||'null');
const cheat=JSON.parse(localStorage.getItem('bg_activeCheat')||'null');
const hs=parseInt(localStorage.getItem('bg_hs_flappy')||'0');
document.getElementById('hHigh').textContent=hs;
if(cheat){document.getElementById('cheatBar').style.display='block';document.getElementById('cheatName').textContent=cheat.name;}

function goHome(){if(loop){cancelAnimationFrame(loop);clearInterval(loop);loop=null;}window.location.href='index.html';}
document.addEventListener('keydown',e=>{if(e.code==='Space'){e.preventDefault();jump();}if(e.code==='Escape')goHome();});
cv.onclick=jump;

function jump(){if(!running){doStart();return;}bird.vy=-8;}
function doStart(){
  if(loop){clearInterval(loop);loop=null;}
  bird={x:90,y:220,vy:0,r:13};pipes=[];score=0;level=1;frame=0;running=true;
  document.getElementById('startBtn').textContent='🖱️ Klicken';
  document.getElementById('startBtn').onclick=jump;
  const slow=cheat&&cheat.code==='SLOWPIPE';
  const spd=slow?1.8:3.2;
  loop=setInterval(()=>{
    frame++;bird.vy+=0.38;bird.y+=bird.vy;
    if(frame%85===0){const gap=138,top=55+Math.random()*(440-gap-110);pipes.push({x:660,top,gap,scored:false});}
    pipes.forEach(p=>p.x-=spd);pipes=pipes.filter(p=>p.x>-55);
    if(bird.y-bird.r<0||bird.y+bird.r>440){end();return;}
    for(const p of pipes){
      if(bird.x+bird.r>p.x&&bird.x-bird.r<p.x+48&&(bird.y-bird.r<p.top||bird.y+bird.r>p.top+p.gap)){end();return;}
      if(!p.scored&&p.x+48<bird.x){p.scored=true;const mult=cheat&&cheat.name.includes('x2')?2:1;score+=1*mult;level=Math.floor(score/5)+1;updateHUD();}
    }
    draw();
  },1000/60);
}

function draw(){
  const gr=ctx.createLinearGradient(0,0,0,440);gr.addColorStop(0,'#020620');gr.addColorStop(1,'#060628');
  ctx.fillStyle=gr;ctx.fillRect(0,0,660,440);
  for(let i=0;i<60;i++){const br=.15+Math.sin(Date.now()/1000+i)*.15;ctx.fillStyle=`rgba(160,200,255,${br})`;ctx.fillRect((i*137)%660,(i*97)%300,1.5,1.5);}
  pipes.forEach(p=>{
    ctx.shadowColor='#1a6fff';ctx.shadowBlur=6;ctx.fillStyle='#0a2045';
    ctx.fillRect(p.x,0,48,p.top);ctx.fillRect(p.x,p.top+p.gap,48,440-p.top-p.gap);
    ctx.fillStyle='#1a4080';ctx.shadowBlur=0;
    ctx.fillRect(p.x-4,p.top-18,56,18);ctx.fillRect(p.x-4,p.top+p.gap,56,18);
  });
  ctx.shadowColor='#4d9fff';ctx.shadowBlur=14;ctx.fillStyle='#4d9fff';
  ctx.beginPath();ctx.arc(bird.x,bird.y,bird.r,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
  ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(bird.x+5,bird.y-3,4,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#111';ctx.beginPath();ctx.arc(bird.x+6,bird.y-3,2,0,Math.PI*2);ctx.fill();
}

function updateHUD(){
  document.getElementById('hScore').textContent=score;document.getElementById('hLevel').textContent=level;
  const curHs=parseInt(localStorage.getItem('bg_hs_flappy')||'0');
  if(score>curHs){localStorage.setItem('bg_hs_flappy',score);document.getElementById('hHigh').textContent=score;}
}

function end(){clearInterval(loop);loop=null;running=false;document.getElementById('startBtn').textContent='▶ Nochmal';document.getElementById('startBtn').onclick=doStart;
localStorage.setItem('bg_lastResult',JSON.stringify({game:'flappy',score,title:'🐦 GAME OVER',cheat:!!cheat}));
if(user) localStorage.setItem('bg_sessionUser',JSON.stringify(user));
setTimeout(()=>window.location.href='index.html',300);}

// idle
ctx.fillStyle='#030620';ctx.fillRect(0,0,660,440);
ctx.font='bold 16px Orbitron,monospace';ctx.fillStyle='rgba(77,159,255,.5)';ctx.textAlign='center';ctx.fillText('Klicken oder START drücken',330,225);
</script>
</body>
</html>
